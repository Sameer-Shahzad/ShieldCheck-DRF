{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto text-center mt-10">
    <h1 class="text-4xl font-extrabold mb-4">Protect Your Website</h1>
    <p class="text-gray-400 mb-8">Enter your URL below to audit HTTP security headers like HSTS, CSP, and X-Frame-Options.</p>
    
    <form class="flex flex-col gap-4">
        <input type="url" placeholder="https://example.com" 
               class="w-full px-5 py-4 rounded-lg bg-gray-800 border border-purple-500 focus:outline-none focus:ring-2 focus:ring-purple-400 text-white">
        <button type="submit" 
                class="purple-gradient hover:opacity-90 py-4 rounded-lg font-bold text-lg shadow-xl transition transform hover:-translate-y-1">
            Run Security Audit
        </button>
    </form>
</div>
{% endblock %}
