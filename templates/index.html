{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto text-center mt-10">
    <h1 class="text-4xl font-extrabold mb-4">Protect Your Website</h1>
    <p class="text-gray-400 mb-8">Audit 10+ critical security headers instantly.</p>
    
    <form id="auditForm" class="flex flex-col gap-4">
        <input type="url" id="targetUrl" placeholder="https://example.com" required
               class="w-full px-5 py-4 rounded-lg bg-gray-800 border border-purple-500 text-white outline-none">
        <button type="submit" id="scanBtn" 
                class="purple-gradient hover:opacity-90 py-4 rounded-lg font-bold text-lg shadow-xl transition transform hover:-translate-y-1">
            Run Security Audit
        </button>
    </form>
</div>

<script>
const sleep = ms => new Promise(r => setTimeout(r, ms));
document.getElementById('auditForm').addEventListener('submit', async function(e) {
    e.preventDefault(); 
    
    const urlInput = document.getElementById('targetUrl').value;
    const btn = document.getElementById('scanBtn');
    
    btn.innerText = "Scanning... Please Wait";
    btn.disabled = true;

    await sleep(2000);

    try {
        const response = await fetch('/api/v1/scan/', {
            method: 'POST',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ url: urlInput })
        });

        if (!response.ok) {
            const errorText = await response.text();
            alert("Audit Failed: Unable to reach the target server. Please verify the URL or try again in a few moments.");
            return;
        }

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem('scanResult', JSON.stringify(data));
            localStorage.setItem('targetUrl', urlInput);
            
            window.location.href = "/report/"; 
            btn.innerText = "Run Security Audit";
            btn.disabled = false;
        } else {
            alert("Audit Failed: Unable to reach the target server. Please verify the URL or try again later.");
            btn.innerText = "Run Security Audit";
            btn.disabled = false;
        }
    } catch (err) {
        alert("Scan failed.");
        btn.disabled = false;
    }
});
</script>
{% endblock %}
